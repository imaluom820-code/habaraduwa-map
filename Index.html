<!DOCTYPE html>
<html>
<head>
    <title>Habaraduwa Drainage Project</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
    </style>
</head>
<body>
<div id="map"></div>
<script>
    const SUPABASE_URL = 'https://prlorecmrvouzbqvmojw.supabase.co/rest/v1/';
    const SUPABASE_KEY = 'sb_publishable_qVGu1b0lT-cPHyClk7ctag_HgIL3O0X';

    // 1. Setup the Map (Centered on Habaraduwa)
    const map = L.map('map').setView([6.00, 80.29], 14);

    // 2. Add the Map background (Free)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const supabase = libsupabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadDrains() {
        // 3. Get data from Supabase
        const { data, error } = await supabase.from('drains').select('*');
        
        if (data) {
            data.forEach(d => {
                // Leaflet expects coordinates differently, so we use a simple parser
                // This will draw your lines on the map
                const geoData = JSON.parse(d.geom); 
                L.geoJSON(geoData, {
                    style: { color: d.condition === 'Poor' ? 'red' : 'blue', weight: 4 }
                }).addTo(map);
            });
        }
    }

    loadDrains();
</script>
</body>
</html>
